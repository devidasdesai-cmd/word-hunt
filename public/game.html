<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Hunt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/game.css" />
  <script>(function(){var t=localStorage.getItem('wordhunt-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo-sm">Word Hunt</span>
      <span class="room-code-badge" id="room-badge">
        Room: <strong id="room-code-display">—</strong>
        <button class="copy-btn" id="copy-link-btn" title="Copy invite link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </span>
    </div>
    <div class="score-bar">
      <div class="score red-score">
        <span class="score-label">Dawn</span>
        <span class="score-num" id="red-remaining">0</span>
        <span class="score-pts">pts</span>
      </div>
      <div class="turn-indicator" id="turn-indicator">
        <div class="turn-dot" id="turn-dot"></div>
        <span id="turn-text">—</span>
      </div>
      <div class="score blue-score">
        <span class="score-pts">pts</span>
        <span class="score-num" id="blue-remaining">0</span>
        <span class="score-label">Dusk</span>
      </div>
    </div>
    <div class="header-right" id="header-right"></div>
  </header>

  <!-- Main layout -->
  <main class="main">
    <!-- Left panel: team roster -->
    <aside class="panel panel-left" id="panel-left">
      <div class="panel-resize-handle" id="panel-resize"></div>
      <div class="team-panel red-team">
        <div class="team-header">
          <span class="team-dot red"></span> Dawn Guild
        </div>
        <div class="player-list" id="red-players"></div>
      </div>
      <div class="team-panel blue-team">
        <div class="team-header">
          <span class="team-dot blue"></span> Dusk Guild
        </div>
        <div class="player-list" id="blue-players"></div>
      </div>
      <div class="team-panel spectator-team" id="spectators-section" style="display:none;">
        <div class="team-header">
          <span class="team-dot"></span> Lobby
        </div>
        <div class="player-list" id="spec-players"></div>
      </div>
    </aside>

    <!-- Center: board + action area -->
    <div class="center">
      <!-- Mobile-only players strip -->
      <div class="mobile-players" id="mobile-players"></div>

      <!-- Action bar (lobby controls, clue form, guessing controls) -->
      <div class="action-bar" id="action-bar"></div>

      <!-- Board -->
      <div class="board" id="board"></div>

      <!-- Log -->
      <div class="log-panel">
        <div class="log-inner" id="log"></div>
      </div>
    </div>
  </main>

  <!-- Settings overlay -->
  <div class="overlay" id="settings-overlay" style="display:none;">
    <div class="overlay-card settings-overlay-card">
      <div class="settings-overlay-header">
        <span class="settings-overlay-title">Game Settings</span>
        <button class="settings-overlay-close" id="settings-overlay-close" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-overlay-body" id="settings-overlay-body"></div>
    </div>
  </div>

  <!-- Role selection overlay (shown before player picks a role in lobby) -->
  <div class="overlay" id="role-overlay" style="display:none;">
    <div class="overlay-card role-overlay-card">
      <h2>Join the Expedition</h2>
      <p class="role-subtitle">Choose your crew and set out for treasure.<br>Your view of the map depends on your role.</p>
      <div class="role-grid" id="role-grid"></div>
    </div>
  </div>

  <!-- Winner overlay -->
  <div class="overlay" id="winner-overlay" style="display:none;">
    <div class="overlay-card">
      <div class="winner-icon" id="winner-icon"></div>
      <h2 id="winner-title"></h2>
      <p id="winner-sub"></p>
      <button class="btn btn-outline" id="new-game-btn">New Game</button>
    </div>
  </div>

  <!-- Treasure found animation -->
  <div class="event-anim" id="treasure-anim">
    <div class="event-anim-bg treasure-bg"></div>
    <div class="event-anim-card">
      <span class="event-anim-icon">✨</span>
      <div class="event-anim-title treasure-title">Treasure Found!</div>
      <div class="event-anim-sub treasure-sub" id="treasure-anim-sub"></div>
    </div>
  </div>

  <!-- Abyss triggered animation -->
  <div class="event-anim" id="abyss-anim">
    <div class="event-anim-bg abyss-bg"></div>
    <div class="event-anim-card">
      <span class="event-anim-icon abyss-spin">🌀</span>
      <div class="event-anim-title abyss-title">Into the Abyss</div>
      <div class="event-anim-sub abyss-sub" id="abyss-anim-sub"></div>
    </div>
  </div>

  <!-- Word definition tooltip -->
  <div class="word-tooltip" id="word-tooltip"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/game.js"></script>
  <script>
    (function () {
      const panel  = document.getElementById('panel-left');
      const handle = document.getElementById('panel-resize');
      if (!panel || !handle) return;

      // Restore saved width
      const saved = localStorage.getItem('wordhunt-panel-width');
      if (saved) panel.style.width = saved + 'px';

      let startX, startW;

      handle.addEventListener('mousedown', function (e) {
        e.preventDefault();
        startX = e.clientX;
        startW = panel.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      function onMove(e) {
        const dx   = e.clientX - startX;
        const newW = Math.max(140, Math.min(320, startW + dx));
        panel.style.width = newW + 'px';
      }

      function onUp() {
        handle.classList.remove('dragging');
        localStorage.setItem('wordhunt-panel-width', Math.round(panel.getBoundingClientRect().width));
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
    })();
  </script>
</body>
</html>
