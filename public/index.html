<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Hunt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('wordhunt-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07080e;
      --surface: #0c0e1b;
      --surface2:#11142a;
      --border:  rgba(255,255,255,0.055);
      --border2: rgba(255,255,255,0.1);
      --border-gold: rgba(184,146,58,0.3);
      --text:    #dde0ec;
      --text-muted: #505570;
      --text-dim:#828aac;
      --gold:    #b8923a;
      --gold-bright: #e2c46a;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(27,74,122,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 100%, rgba(154,34,50,0.05) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── Wrapper ── */
    .page {
      position: relative;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 2.25rem;
    }

    /* ── Brand ── */
    .brand { text-align: center; }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.4rem;
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.65rem;
    }

    .brand .tagline {
      color: var(--text-muted);
      font-family: 'Playfair Display', serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-style: italic;
    }

    /* ── Form panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border-gold);
      border-radius: 18px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03);
    }

    /* ── Field ── */
    .field { display: flex; flex-direction: column; gap: 0.45rem; }

    .field label {
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--border-gold);
      box-shadow: 0 0 0 3px rgba(184,146,58,0.08);
    }

    .field input::placeholder { color: var(--text-muted); font-weight: 400; }

    /* ── Primary CTA ── */
    .btn-primary {
      width: 100%;
      padding: 0.9rem 1rem;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      color: #1a1000;
      border: none;
      border-radius: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 12px rgba(184,146,58,0.22);
    }

    .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(184,146,58,0.32); }
    .btn-primary:active { opacity: 1; transform: scale(0.98); }

    /* ── Divider ── */
    .divider { display: flex; align-items: center; gap: 0.9rem; }

    .divider::before,
    .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-gold); opacity: 0.5; }

    .divider span {
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      font-style: italic;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Join row ── */
    .join-row { display: flex; gap: 0.5rem; }

    .join-row input {
      flex: 1;
      min-width: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.8rem 1rem;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .join-row input:focus {
      border-color: var(--border-gold);
      box-shadow: 0 0 0 3px rgba(184,146,58,0.08);
    }

    .join-row input::placeholder {
      text-transform: none;
      letter-spacing: 0.04em;
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .btn-secondary {
      flex-shrink: 0;
      padding: 0.8rem 1.25rem;
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      border-color: var(--border-gold);
      color: var(--text);
      background: rgba(184,146,58,0.06);
    }

    .btn-secondary:active { transform: scale(0.98); }

    /* ── Error ── */
    .error-msg { font-size: 0.74rem; font-weight: 500; color: #c0392b; min-height: 1em; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      font-style: italic;
      color: var(--text-muted);
      opacity: 0.55;
      letter-spacing: 0.07em;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { align-items: flex-start; padding-top: 3rem; }
      .brand h1 { font-size: 2.8rem; }
      .panel { padding: 1.6rem 1.4rem; gap: 1.25rem; }
    }

    @media (max-width: 360px) {
      .brand h1 { font-size: 2.4rem; }
    }

    /* ── Light Mode ── */
    [data-theme="light"] {
      --bg:      #eeecdf;
      --surface: #f7f5ec;
      --surface2:#e8e5d5;
      --border:  rgba(80,60,20,0.1);
      --border2: rgba(80,60,20,0.18);
      --border-gold: rgba(140,100,20,0.35);
      --text:    #1e1c14;
      --text-muted: #7a7258;
      --text-dim:#5a5440;
      --gold:    #8c6614;
      --gold-bright: #c0952c;
    }

    [data-theme="light"] .field input:focus,
    [data-theme="light"] .join-row input:focus {
      border-color: rgba(140,100,20,0.4);
      box-shadow: 0 0 0 3px rgba(140,100,20,0.06);
    }

    [data-theme="light"] .btn-secondary:hover {
      border-color: rgba(140,100,20,0.35);
      color: var(--text);
      background: rgba(140,100,20,0.05);
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1.25rem;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      z-index: 10;
      transition: color 0.2s, border-color 0.2s;
    }
    .theme-toggle:hover { color: var(--gold-bright); border-color: var(--border-gold); }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode" aria-label="Toggle theme"></button>
  <div class="page">

    <header class="brand">
      <h1>Word Hunt</h1>
      <p class="tagline">One clue can change everything</p>
    </header>

    <div class="panel">

      <!-- Name -->
      <div class="field">
        <label for="player-name">Your Name</label>
        <input type="text" id="player-name" placeholder="Enter your name…"
          maxlength="20" autocomplete="off" />
      </div>

      <!-- Primary CTA -->
      <button class="btn-primary" id="create-btn">Create New Game</button>

      <!-- Divider -->
      <div class="divider"><span>or join a room</span></div>

      <!-- Join -->
      <div class="field">
        <label for="room-code">Room Code</label>
        <div class="join-row">
          <input type="text" id="room-code" placeholder="e.g. AB3XY"
            maxlength="5" autocomplete="off" autocorrect="off"
            autocapitalize="characters" spellcheck="false" />
          <button class="btn-secondary" id="join-btn">Join →</button>
        </div>
        <p class="error-msg" id="join-error"></p>
      </div>

    </div>

    <p class="footer">Share the room code — the more hunters the merrier</p>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket    = io();
    const nameInput = document.getElementById('player-name');
    const roomInput = document.getElementById('room-code');
    const joinError = document.getElementById('join-error');

    // Auto-fill from invite link
    const inviteCode = new URLSearchParams(window.location.search).get('join');
    if (inviteCode) roomInput.value = inviteCode.toUpperCase();

    // Restore saved name
    const savedName = localStorage.getItem('wordhunt-name');
    if (savedName) nameInput.value = savedName;

    nameInput.addEventListener('input', () => {
      localStorage.setItem('wordhunt-name', nameInput.value);
    });

    roomInput.addEventListener('input', () => {
      roomInput.value = roomInput.value.toUpperCase();
      joinError.textContent = '';
    });

    document.getElementById('create-btn').addEventListener('click', () => {
      socket.emit('create-room', { name: nameInput.value.trim() || 'Player' });
    });

    document.getElementById('join-btn').addEventListener('click', joinRoom);
    roomInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('create-btn').click(); });

    function joinRoom() {
      const code = roomInput.value.trim().toUpperCase();
      if (!code) { joinError.textContent = 'Enter a room code first'; return; }
      socket.emit('join-room', { roomCode: code, name: nameInput.value.trim() || 'Player' });
    }

    socket.on('room-joined', ({ roomCode, playerId }) => {
      localStorage.setItem('wordrush-player-id', playerId);
      window.location.href = `/game.html?room=${roomCode}&pid=${playerId}`;
    });

    socket.on('error', ({ message }) => {
      joinError.textContent = message;
    });

    // Focus
    if (!nameInput.value) nameInput.focus();
    else if (inviteCode)   roomInput.focus();

    // Theme toggle
    (function () {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const sunSvg  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
      const moonSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      function applyIcon() {
        btn.innerHTML = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? sunSvg : moonSvg;
      }
      btn.addEventListener('click', () => {
        const next = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('wordhunt-theme', next);
        applyIcon();
      });
      applyIcon();
    })();
  </script>
</body>
</html>
