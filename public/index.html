<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Rush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d14;
      --surface: #161926;
      --surface2: #1e2236;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #e8eaf0;
      --text-muted: #6b7094;
      --text-dim: #9095b0;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Wrapper ── */
    .page {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 2.25rem;
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      letter-spacing: 0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 38%, #2980b9 62%, #1a5276 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }

    .brand .tagline {
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Form panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Field ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .field label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    .field input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Primary CTA ── */
    .btn-primary {
      width: 100%;
      padding: 0.9rem 1rem;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s;
    }

    .btn-primary:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { opacity: 1; transform: scale(0.98); }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    .divider span {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Join row ── */
    .join-row {
      display: flex;
      gap: 0.5rem;
    }

    .join-row input {
      flex: 1;
      min-width: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.8rem 1rem;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .join-row input:focus {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    .join-row input::placeholder {
      text-transform: none;
      letter-spacing: 0.04em;
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .btn-secondary {
      flex-shrink: 0;
      padding: 0.8rem 1.25rem;
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.28);
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .btn-secondary:active { transform: scale(0.98); }

    /* ── Error ── */
    .error-msg {
      font-size: 0.75rem;
      font-weight: 500;
      color: #e74c3c;
      min-height: 1em;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      opacity: 0.5;
      letter-spacing: 0.07em;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { align-items: flex-start; padding-top: 3rem; }
      .brand h1 { font-size: 2.75rem; }
      .panel { padding: 1.6rem 1.4rem; gap: 1.25rem; }
    }

    @media (max-width: 360px) {
      .brand h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="brand">
      <h1>Word Rush</h1>
      <p class="tagline">Real-time multiplayer word strategy</p>
    </header>

    <div class="panel">

      <!-- Name -->
      <div class="field">
        <label for="player-name">Your Name</label>
        <input type="text" id="player-name" placeholder="Enter your name…"
          maxlength="20" autocomplete="off" />
      </div>

      <!-- Primary CTA -->
      <button class="btn-primary" id="create-btn">Create New Game</button>

      <!-- Divider -->
      <div class="divider"><span>or join a room</span></div>

      <!-- Join -->
      <div class="field">
        <label for="room-code">Room Code</label>
        <div class="join-row">
          <input type="text" id="room-code" placeholder="e.g. AB3XY"
            maxlength="5" autocomplete="off" autocorrect="off"
            autocapitalize="characters" spellcheck="false" />
          <button class="btn-secondary" id="join-btn">Join →</button>
        </div>
        <p class="error-msg" id="join-error"></p>
      </div>

    </div>

    <p class="footer">Share the room code with friends after creating</p>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket    = io();
    const nameInput = document.getElementById('player-name');
    const roomInput = document.getElementById('room-code');
    const joinError = document.getElementById('join-error');

    // Auto-fill from invite link
    const inviteCode = new URLSearchParams(window.location.search).get('join');
    if (inviteCode) roomInput.value = inviteCode.toUpperCase();

    // Restore saved name
    const savedName = localStorage.getItem('wordrush-name');
    if (savedName) nameInput.value = savedName;

    nameInput.addEventListener('input', () => {
      localStorage.setItem('wordrush-name', nameInput.value);
    });

    roomInput.addEventListener('input', () => {
      roomInput.value = roomInput.value.toUpperCase();
      joinError.textContent = '';
    });

    document.getElementById('create-btn').addEventListener('click', () => {
      socket.emit('create-room', { name: nameInput.value.trim() || 'Player' });
    });

    document.getElementById('join-btn').addEventListener('click', joinRoom);
    roomInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('create-btn').click(); });

    function joinRoom() {
      const code = roomInput.value.trim().toUpperCase();
      if (!code) { joinError.textContent = 'Enter a room code first'; return; }
      socket.emit('join-room', { roomCode: code, name: nameInput.value.trim() || 'Player' });
    }

    socket.on('room-joined', ({ roomCode, playerId }) => {
      localStorage.setItem('wordrush-player-id', playerId);
      window.location.href = `/game.html?room=${roomCode}&pid=${playerId}`;
    });

    socket.on('error', ({ message }) => {
      joinError.textContent = message;
    });

    // Focus
    if (!nameInput.value) nameInput.focus();
    else if (inviteCode)   roomInput.focus();
  </script>
</body>
</html>
